  <!-- Form Card Section -->
  <section id="health-form" class="min-h-screen flex items-center justify-center py-32 px-6">
    <div class="w-full max-w-lg">

      <div class="text-center mb-10">
        <div

        <p class="text-ink-soft leading-relaxed">
          Isi nama dan nombor telefon anda. Saya akan hubungi anda di WhatsApp untuk sesi konsultasi percuma.
        </p>
      </div>

      <div class="bg-white rounded-[2.5rem] p-8 sm:p-12 shadow-2xl border border-matcha-light">
        <div class="grid grid-cols-1 gap-6">

          <!-- Name -->
          <div>
            <label for="name" class="block text-sm font-semibold text-ink-soft mb-2">Nama Penuh</label>

              class="w-full px-4 py-3 bg-matcha-pale border border-matcha-light rounded-xl focus:bg-white focus:ring-2 focus:ring-matcha-deep focus:border-matcha-deep outline-none transition-all"
              placeholder="cth: Abdul Rahman">
          </div>

          <!-- Phone Number -->
          <div>
            <label for="phone" class="block text-sm font-semibold text-ink-soft mb-2">No. Telefon (WhatsApp)</label>
            <input type="tel" id="phone"
              class="w-full px-4 py-3 bg-matcha-pale border border-matcha-light rounded-xl focus:bg-white focus:ring-2 focus:ring-matcha-deep focus:border-matcha-deep outline-none transition-all"
              placeholder="cth: 0123456789">
          </div>

          <!-- Submit -->
          <div class="pt-2">
            <button onclick="sendWhatsApp()" data-wa-source="konsultasi-percuma-form"
              data-wa-intent="Konsultasi Percuma"
              class="wa-cta w-full bg-[#25D366] text-white px-8 py-4 rounded-xl hover:bg-[#20BA5A] active:scale-95 transition-all font-bold text-lg shadow-lg hover:shadow-xl flex items-center justify-center gap-3">

  <script>
    function sendWhatsApp() {
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const msgEl = document.getElementById('formMessage');

      if (!name || !phone) {
        msgEl.innerHTML = '<span class="text-strawberry">❌ Sila isi nama dan nombor telefon anda.</span>';
        return;
      }

      const message = `Assalamualaikum Hana! Saya *${name}* (${phone}) nak minta konsultasi takaful percuma. Boleh bantu?`;
      const encodedMessage = encodeURIComponent(message);
      const whatsappURL = `https://wa.me/60132522587?text=${encodedMessage}`;

      msgEl.innerHTML = '<span class="text-matcha-deep flex items-center justify-center gap-2">✅ Berjaya! Membuka WhatsApp...</span>';

      setTimeout(() => {
        window.open(whatsappURL, '_blank');
      }, 500);
    }
  </script>
